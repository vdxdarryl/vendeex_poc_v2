# VendeeX 2.0 - Netlify Configuration

[build]
  # Directory to publish (static files)
  publish = "."

  # Directory containing serverless functions
  functions = "netlify/functions"

# Redirect API calls to serverless functions

# Authentication API
[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth/register"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth/login"
  status = 200

# Search API
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

# Product Refinement (conversational)
[[redirects]]
  from = "/api/refine"
  to = "/.netlify/functions/refine"
  status = 200

# Health check
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

# ACP Checkout - Create and List sessions
[[redirects]]
  from = "/api/acp/checkout_sessions"
  to = "/.netlify/functions/acp-checkout"
  status = 200

# ACP Checkout - Get, Update session
[[redirects]]
  from = "/api/acp/checkout_sessions/:id"
  to = "/.netlify/functions/acp-checkout/:id"
  status = 200

# ACP Checkout - Complete session
[[redirects]]
  from = "/api/acp/checkout_sessions/:id/complete"
  to = "/.netlify/functions/acp-checkout/:id/complete"
  status = 200

# ACP Checkout - Cancel session
[[redirects]]
  from = "/api/acp/checkout_sessions/:id/cancel"
  to = "/.netlify/functions/acp-checkout/:id/cancel"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache CSS/JS for 1 hour, revalidate after — allows quick updates for demo
# Cache-busting query strings (e.g. ?v=3.4) ensure fresh files on deploy
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
